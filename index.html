<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My AI Operations Hub</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #061326;
      --cyan: #42eaff;
      --cyan2: #00a9ff;
      --chip: #35f3ff;
      --text: #e8fbff;
      --muted: #8eb6c8;
      --panel: rgba(2, 14, 27, .88);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 49% 44%, rgba(15, 143, 224, .32), transparent 31%),
        radial-gradient(circle at 50% 46%, rgba(66, 234, 255, .10), transparent 45%),
        linear-gradient(135deg, #020713, #06234a 55%, #020b18);
      overflow: hidden;
    }
    .app {
      display: grid;
      grid-template-columns: 1fr 330px;
      height: 100vh;
      gap: 14px;
      padding: 14px;
    }
    .stage {
      position: relative;
      overflow: hidden;
      border-radius: 10px;
      background:
        radial-gradient(circle at 50% 45%, rgba(50, 220, 255, .08), transparent 34%),
        linear-gradient(180deg, rgba(4, 28, 56, .28), rgba(0, 5, 14, .28));
      border: 1px solid rgba(66, 234, 255, .12);
      box-shadow: inset 0 0 80px rgba(66,234,255,.06), 0 24px 80px rgba(0,0,0,.35);
    }
    .title {
      position: absolute;
      left: 22px;
      top: 18px;
      z-index: 20;
      pointer-events: none;
    }
    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0;
    }
    .title p {
      margin: 5px 0 0;
      font-size: 12px;
      color: var(--muted);
    }
    svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    .brain-shape {
      fill: rgba(2, 26, 52, .24);
      stroke: rgba(66, 234, 255, .28);
      stroke-width: 2;
      filter: drop-shadow(0 0 18px rgba(66,234,255,.18));
    }
    .trace {
      fill: none;
      stroke: rgba(40, 209, 255, .72);
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 5px rgba(66,234,255,.55));
      transition: opacity .18s ease, stroke .18s ease, stroke-width .18s ease;
    }
    .trace.faint { opacity: .34; stroke-width: 1.5; }
    .trace.active {
      stroke: rgba(107, 247, 255, 1);
      stroke-width: 3;
      filter: drop-shadow(0 0 10px rgba(66,234,255,.95));
      stroke-dasharray: 8 12;
      animation: move 2.3s linear infinite;
    }
    @keyframes move { to { stroke-dashoffset: -80; } }
    .node-dot {
      fill: #69f3ff;
      filter: drop-shadow(0 0 7px rgba(66,234,255,.95));
    }
    .micro {
      fill: none;
      stroke: rgba(66,234,255,.30);
      stroke-width: 1.1;
    }
    .chip {
      cursor: pointer;
    }
    .chip-body {
      fill: url(#chipGrad);
      stroke: rgba(172, 255, 255, .95);
      stroke-width: 2.2;
      filter: drop-shadow(0 0 24px rgba(53,243,255,.7));
    }
    .chip-pin {
      stroke: rgba(98, 245, 255, .85);
      stroke-width: 2;
      stroke-linecap: round;
    }
    .chip-text {
      fill: #036070;
      font: 800 38px Inter, system-ui, sans-serif;
      text-anchor: middle;
      dominant-baseline: middle;
    }
    .agent-label {
      position: absolute;
      transform: translate(-50%, -50%);
      border: 1px solid rgba(66,234,255,.18);
      border-radius: 999px;
      padding: 6px 9px;
      background: rgba(1, 14, 29, .70);
      color: #dffbff;
      font-size: 10.5px;
      white-space: nowrap;
      cursor: pointer;
      z-index: 12;
      opacity: .78;
      transition: opacity .18s ease, border-color .18s ease, box-shadow .18s ease, transform .18s ease;
    }
    .agent-label:hover,
    .agent-label.active {
      opacity: 1;
      border-color: rgba(66,234,255,.85);
      transform: translate(-50%, -50%) scale(1.06);
      box-shadow: 0 0 16px rgba(66,234,255,.35);
    }
    .agent-label.dim { opacity: .22; }
    .skill-bubble {
      position: absolute;
      z-index: 14;
      transform: translate(-50%, -50%);
      max-width: 158px;
      padding: 6px 8px;
      border: 1px solid rgba(66,234,255,.26);
      border-radius: 999px;
      background: rgba(0, 10, 22, .84);
      color: #e6fbff;
      font-size: 10px;
      line-height: 1.1;
      text-align: center;
      box-shadow: 0 0 13px rgba(66,234,255,.16);
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
    }
    .skill-bubble.open {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
    .skill-bubble.all-open {
      opacity: .86;
      transform: translate(-50%, -50%) scale(1);
    }
    .panel {
      border: 1px solid rgba(66,234,255,.16);
      border-radius: 10px;
      background: var(--panel);
      box-shadow: 0 24px 80px rgba(0,0,0,.32);
      padding: 15px;
      overflow: auto;
    }
    .panel h2 {
      margin: 0 0 4px;
      font-size: 19px;
    }
    .tech {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 14px;
      word-break: break-word;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }
    .stat {
      border: 1px solid rgba(66,234,255,.13);
      border-radius: 8px;
      padding: 8px;
      background: rgba(1, 10, 21, .68);
    }
    .stat b { display: block; color: var(--cyan); font-size: 18px; line-height: 1; }
    .stat span { color: var(--muted); font-size: 10.5px; }
    input {
      width: 100%;
      border: 1px solid rgba(66,234,255,.20);
      border-radius: 8px;
      padding: 10px;
      background: rgba(0, 8, 18, .72);
      color: var(--text);
      font: inherit;
      font-size: 13px;
      margin-bottom: 12px;
    }
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }
    .filters button {
      border: 1px solid rgba(66,234,255,.18);
      border-radius: 999px;
      padding: 6px 8px;
      background: rgba(1, 10, 21, .72);
      color: #d8f9ff;
      cursor: pointer;
      font-size: 11px;
    }
    .filters button.active {
      border-color: rgba(66,234,255,.82);
      background: rgba(66,234,255,.14);
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }
    .actions button {
      border: 1px solid rgba(66,234,255,.20);
      border-radius: 8px;
      padding: 9px 10px;
      background: rgba(66,234,255,.10);
      color: #e8fbff;
      cursor: pointer;
      font-weight: 650;
      font-size: 12px;
    }
    .section {
      margin: 14px 0 8px;
      color: #aceef8;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }
    .pill {
      border: 1px solid rgba(66,234,255,.18);
      border-radius: 999px;
      padding: 6px 8px;
      background: rgba(0, 9, 19, .72);
      color: #e6fbff;
      font-size: 11px;
    }
    .flow {
      display: grid;
      gap: 8px;
    }
    .flow-step {
      border: 1px solid rgba(66,234,255,.13);
      border-radius: 8px;
      padding: 8px;
      background: rgba(0, 9, 19, .55);
      color: #d8f9ff;
      font-size: 11px;
      line-height: 1.35;
    }
    .flow-step b { color: var(--cyan); }
    .rows { display: grid; gap: 7px; }
    .row {
      border: 1px solid rgba(66,234,255,.12);
      border-radius: 8px;
      padding: 8px;
      background: rgba(0, 9, 19, .58);
      cursor: pointer;
    }
    .row:hover { border-color: rgba(66,234,255,.55); }
    .row strong { display: block; font-size: 12px; margin-bottom: 3px; }
    .row span { display: block; color: var(--muted); font-size: 10.5px; line-height: 1.3; }
    @media (max-width: 980px) {
      body { overflow: auto; }
      .app { grid-template-columns: 1fr; height: auto; }
      .stage { height: 740px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="stage" id="stage">
      <div class="title">
        <h1>My AI Operations Hub</h1>
        <p>Central router, specialist agents, reusable skills</p>
      </div>
      <svg id="map" viewBox="0 0 1000 760" preserveAspectRatio="xMidYMid meet">
        <defs>
          <clipPath id="brainClip">
            <path d="M226 377 C171 344 171 267 233 239 C251 164 347 145 399 188 C451 109 579 117 623 194 C704 184 775 238 773 318 C850 359 844 457 765 492 C737 576 625 604 555 552 C498 627 382 609 346 529 C263 532 206 463 226 377 Z"/>
          </clipPath>
          <linearGradient id="chipGrad" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0" stop-color="#71fbff"/>
            <stop offset="1" stop-color="#20dfef"/>
          </linearGradient>
        </defs>
        <path class="brain-shape" d="M226 377 C171 344 171 267 233 239 C251 164 347 145 399 188 C451 109 579 117 623 194 C704 184 775 238 773 318 C850 359 844 457 765 492 C737 576 625 604 555 552 C498 627 382 609 346 529 C263 532 206 463 226 377 Z"/>
        <g id="traces" clip-path="url(#brainClip)"></g>
        <g class="chip" id="chip">
          <rect class="chip-body" x="463" y="332" width="92" height="92" rx="8"/>
          <text class="chip-text" x="509" y="380">AI</text>
          <g id="pins"></g>
        </g>
      </svg>
    </section>

    <aside class="panel">
      <h2 id="title">Cerebro Central</h2>
      <div class="tech" id="tech">central-router-agent</div>
      <div class="stats">
        <div class="stat"><b>18</b><span>agents</span></div>
        <div class="stat"><b id="skillCount">57</b><span>skills</span></div>
        <div class="stat"><b>3</b><span>levels</span></div>
      </div>
      <input id="search" type="search" placeholder="Buscar agente ou skill" />
      <div class="filters" id="filters"></div>
      <div class="actions">
        <button id="expandAll">Expandir tudo</button>
        <button id="collapseAll">Recolher tudo</button>
      </div>
      <div class="section">Skills ligadas</div>
      <div class="pills" id="skills"></div>
      <div class="section">Fluxo de decisao</div>
      <div class="flow" id="flow"></div>
      <div class="section">Agentes</div>
      <div class="rows" id="rows"></div>
    </aside>
  </main>

  <script>
    const agents = [
      {id:"frontend", name:"Designer Produto Web", tech:"frontend-product-agent.md", group:"product", x:232, y:258, skills:["Design Frontend","Guia de Web Design","QA Web Browser","UX Senior","Boas Praticas React"]},
      {id:"code", name:"Engenheiro de Codigo", tech:"engineering-lead-agent.md", group:"engineering", x:312, y:198, skills:["Mapa do Projeto","Plano de Implementacao","Ciclo de Pull Request","Estrategia de Testes","Revisao de Codigo"]},
      {id:"ci", name:"Gestor CI e Releases", tech:"ci-release-agent.md", group:"engineering", x:431, y:168, skills:["Correcao de CI","Atualizacao de Dependencias","Gestor de Releases","Prevencao de Segredos"]},
      {id:"productivity", name:"Operador Productivity Suite", tech:"productivity-ops-agent", group:"productivity", x:585, y:178, skills:["Admin Productivity Suite","Collaboration Tools","Seguranca do Environment","PowerShell Seguro"]},
      {id:"identity", name:"Guardiao de Acessos", tech:"identity-access-agent.md", group:"productivity", x:707, y:240, skills:["Gestao de Identidade","Seguranca do Environment","Admin Productivity Suite","Modelo de Ameacas"]},
      {id:"itsm", name:"Service Integration Ops", tech:"service-integration-ops-agent.md", group:"ops", x:757, y:330, skills:["Service Desk ITIL","Integracao Service Desk Issue Tracker Productivity","Cloud Functions","Admin Productivity Suite"]},
      {id:"azf", name:"Engenheiro Cloud Functions", tech:"cloud-functions-engineer-agent", group:"cloud", x:748, y:430, skills:["Cloud Functions","Seguranca Cloud Functions","Deploy Cloud Seguro","Logs e Alertas Cloud"]},
      {id:"perf", name:"Analista de Performance", tech:"performance-agent.md", group:"engineering", x:682, y:520, skills:["Analise de Performance","Instrumentacao Observavel","Seguranca de Migracoes","Boas Praticas React"]},
      {id:"docs", name:"Documentador", tech:"documentation-reporting-agent.md", group:"product", x:585, y:585, skills:["Documentacao do Codigo","Criador de Relatorios","Office e PDF","Texto Direto","Transcricao"]},
      {id:"cont", name:"Gestor de Conversa", tech:"conversation-continuity-agent.md", group:"ai", x:503, y:626, skills:["Gestao de Limites","Poupanca de Contexto","Otimizador de Contexto"]},
      {id:"ai", name:"Governanca de IA", tech:"ai-governance-agent", group:"ai", x:420, y:594, skills:["Governanca de IA","Construtor de Agentes Productivity","Arquitetura Agents SDK","Seguranca de Agentes IA"]},
      {id:"systems", name:"Arquiteto de Sistemas", tech:"systems-architect-agent", group:"ops", x:331, y:535, skills:["Arquitetura de Integracoes","Implementacao de Sistemas","Avaliacao de Fornecedores","Plano de Mudanca"]},
      {id:"security", name:"Guardiao de Seguranca", tech:"security-review-agent.md", group:"security", x:270, y:460, skills:["Modelo de Ameacas","Prevencao de Segredos","Seguranca de Migracoes","Seguranca do Environment"]},
      {id:"auto", name:"Arquiteto de Automacao", tech:"automation-architect-agent.md", group:"automation", x:229, y:390, skills:["Desenho de Automacao","Fabrica de Automacao","Criador de CLI","PowerShell Seguro"]},
      {id:"intauto", name:"Eng. Automacao Interna", tech:"internal-automation-engineer-agent.md", group:"automation", x:262, y:320, skills:["Ferramentas Internas","Runbook Para Automacao","Modulos PowerShell","Criador de CLI"]},
      {id:"incident", name:"Gestor de Incidentes", tech:"incident-manager-agent", group:"ops", x:635, y:468, skills:["Erro Producao Para Fix","Monitorizacao Monitoring Platform","Instrumentacao Observavel","Resumo Operacional"]},
      {id:"azo", name:"Monitor Cloud", tech:"cloud-observability-agent", group:"cloud", x:660, y:390, skills:["Logs e Alertas Cloud","Monitorizacao Monitoring Platform","Erro Producao Para Fix","Analise de Performance"]},
      {id:"coach", name:"Coach Produtividade IA", tech:"ai-productivity-coach-agent", group:"ai", x:368, y:282, skills:["Auditor de Workflow","Otimizador de Contexto","Poupanca de Contexto","Prompt Para Ticket"]}
    ];
    const filters = {all:"Tudo", cloud:"Cloud", productivity:"Productivity", security:"Seguranca", automation:"Automacao", engineering:"Codigo", ai:"IA", ops:"Operacoes", product:"Produto/Docs"};
    const center = {x:509, y:378};
    const traces = document.getElementById("traces");
    const pins = document.getElementById("pins");
    const stage = document.getElementById("stage");
    const title = document.getElementById("title");
    const tech = document.getElementById("tech");
    const skills = document.getElementById("skills");
    const flow = document.getElementById("flow");
    const rows = document.getElementById("rows");
    const search = document.getElementById("search");
    const filterBar = document.getElementById("filters");
    const lineMap = new Map();
    const labels = new Map();
    const bubbles = new Map();
    let selected = null;
    let activeFilter = "all";
    let expandedAll = false;
    document.getElementById("skillCount").textContent = [...new Set(agents.flatMap(a => a.skills))].length + 1;

    function route(a) {
      const midX = center.x + (a.x - center.x) * .44;
      const midY = center.y;
      const turnX = center.x + (a.x - center.x) * .68;
      return `M ${center.x} ${center.y} L ${midX} ${midY} L ${turnX} ${a.y} L ${a.x} ${a.y}`;
    }
    function addTrace(a) {
      const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
      p.setAttribute("d", route(a));
      p.classList.add("trace");
      p.dataset.agent = a.id;
      traces.appendChild(p);
      lineMap.set(a.id, p);
      const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      c.setAttribute("cx", a.x);
      c.setAttribute("cy", a.y);
      c.setAttribute("r", 3.8);
      c.setAttribute("class", "node-dot");
      traces.appendChild(c);
    }
    function addMicroCircuits() {
      const segments = [
        [330,210,330,150,315,150],[392,190,392,124,407,124],[500,325,500,118,516,118],[590,205,590,138,606,138],
        [650,250,730,250,730,232],[668,305,792,305,792,288],[660,438,810,438,810,456],[594,506,594,596,610,596],
        [506,428,506,652,490,652],[424,520,424,630,408,630],[330,470,228,470,228,488],[302,390,174,390,174,372],
        [310,305,190,305,190,286],[420,330,340,330,340,350],[562,352,635,352,635,370],[464,410,382,410,382,430]
      ];
      segments.forEach(s => {
        const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
        p.setAttribute("d", `M ${s[0]} ${s[1]} L ${s[2]} ${s[3]} L ${s[4]} ${s[5]}`);
        p.setAttribute("class", "micro");
        traces.appendChild(p);
        const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        c.setAttribute("cx", s[4]);
        c.setAttribute("cy", s[5]);
        c.setAttribute("r", 2.4);
        c.setAttribute("class", "node-dot");
        traces.appendChild(c);
      });
      for (let i = 0; i < 18; i++) {
        const x = 468 + (i % 6) * 16;
        const yTop = 330 - 10;
        const yBottom = 424 + 10;
        ["top","bottom"].forEach(pos => {
          const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
          l.setAttribute("x1", x);
          l.setAttribute("x2", x);
          l.setAttribute("y1", pos === "top" ? yTop : 424);
          l.setAttribute("y2", pos === "top" ? 332 : yBottom);
          l.setAttribute("class", "chip-pin");
          pins.appendChild(l);
        });
      }
      for (let i = 0; i < 12; i++) {
        const y = 338 + i * 7;
        [["left",463,452],["right",555,566]].forEach(([pos,x1,x2]) => {
          const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
          l.setAttribute("x1", x1);
          l.setAttribute("x2", x2);
          l.setAttribute("y1", y);
          l.setAttribute("y2", y);
          l.setAttribute("class", "chip-pin");
          pins.appendChild(l);
        });
      }
    }
    function addLabel(a) {
      const el = document.createElement("button");
      el.className = "agent-label";
      el.textContent = a.name;
      el.style.left = `${a.x / 10}%`;
      el.style.top = `${a.y / 7.6}%`;
      el.title = `${a.name} - clique para abrir/recolher skills`;
      el.onclick = () => select(a.id);
      stage.appendChild(el);
      labels.set(a.id, el);
    }
    function bubblePosition(a, index, total) {
      const radius = total > 4 ? 72 : 62;
      const start = -120;
      const end = 120;
      const angle = (start + (end - start) * (index / Math.max(1, total - 1))) * Math.PI / 180;
      const bias = a.x < center.x ? Math.PI : 0;
      const x = a.x + Math.cos(angle + bias) * radius;
      const y = a.y + Math.sin(angle + bias) * radius;
      return {
        left: Math.max(8, Math.min(92, x / 10)),
        top: Math.max(8, Math.min(92, y / 7.6))
      };
    }
    function addBubbles(a) {
      const items = [];
      a.skills.forEach((skill, i) => {
        const b = document.createElement("div");
        b.className = "skill-bubble";
        b.textContent = skill;
        b.title = `${skill} ligada a ${a.name}`;
        const p = bubblePosition(a, i, a.skills.length);
        b.style.left = `${p.left}%`;
        b.style.top = `${p.top}%`;
        b.dataset.agent = a.id;
        stage.appendChild(b);
        items.push(b);
      });
      bubbles.set(a.id, items);
    }
    function showAgent(a) {
      title.textContent = a ? a.name : "Cerebro Central";
      tech.textContent = a ? a.tech : "central-router-agent";
      const list = a ? a.skills : ["Roteamento Inteligente","Gestao de Limites","Poupanca de Contexto","Auditor de Workflow"];
      skills.innerHTML = "";
      list.forEach(s => {
        const p = document.createElement("span");
        p.className = "pill";
        p.textContent = s;
        skills.appendChild(p);
      });
      const level = a ? (["productivity","cloud","security","ops"].includes(a.group) ? "critical quando houver escrita/produção" : "normal por padrão") : "light / normal / critical";
      const steps = [
        a ? `Pedido vai para ${a.name}` : "Pedido vai para o Cérebro Central",
        a ? `Seleciona skills: ${list.slice(0,3).join(", ")}` : "Escolhe agente, skills e nível de execução",
        `Nível recomendado: ${level}`,
        "Verifica só o necessário para poupar contexto e limites"
      ];
      flow.innerHTML = "";
      steps.forEach((text, i) => {
        const item = document.createElement("div");
        item.className = "flow-step";
        item.innerHTML = `<b>${i + 1}.</b> ${text}`;
        flow.appendChild(item);
      });
    }
    function visible(a) {
      const q = search.value.trim().toLowerCase();
      const hay = `${a.name} ${a.tech} ${a.skills.join(" ")}`.toLowerCase();
      return (activeFilter === "all" || a.group === activeFilter) && (!q || hay.includes(q));
    }
    function select(id) {
      selected = selected === id ? null : id;
      update();
    }
    function update() {
      const visibleAgents = agents.filter(visible);
      const ids = new Set(visibleAgents.map(a => a.id));
      agents.forEach(a => {
        const show = ids.has(a.id);
        const isActive = !selected ? show : selected === a.id;
        lineMap.get(a.id).style.display = show ? "block" : "none";
        lineMap.get(a.id).className.baseVal = isActive ? "trace active" : "trace faint";
        labels.get(a.id).style.display = show ? "block" : "none";
        labels.get(a.id).classList.toggle("active", selected === a.id);
        labels.get(a.id).classList.toggle("dim", selected && selected !== a.id);
        (bubbles.get(a.id) || []).forEach(b => {
          b.style.display = show ? "block" : "none";
          b.classList.toggle("open", selected === a.id);
          b.classList.toggle("all-open", expandedAll && !selected && show);
        });
      });
      [...filterBar.children].forEach(b => b.classList.toggle("active", b.dataset.filter === activeFilter));
      if (selected && !ids.has(selected)) selected = null;
      const agent = agents.find(a => a.id === selected);
      showAgent(agent || null);
      rows.innerHTML = "";
      visibleAgents.forEach(a => {
        const r = document.createElement("div");
        r.className = "row";
        r.innerHTML = `<strong>${a.name}</strong><span>${a.skills.slice(0,3).join(" · ")}</span>`;
        r.onclick = () => select(a.id);
        rows.appendChild(r);
      });
    }
    Object.entries(filters).forEach(([key,label]) => {
      const b = document.createElement("button");
      b.textContent = label;
      b.dataset.filter = key;
      b.onclick = () => { activeFilter = key; selected = null; expandedAll = false; update(); };
      filterBar.appendChild(b);
    });
    agents.forEach(addTrace);
    addMicroCircuits();
    agents.forEach(addLabel);
    agents.forEach(addBubbles);
    document.getElementById("chip").onclick = () => { selected = null; expandedAll = false; update(); };
    document.getElementById("expandAll").onclick = () => { selected = null; expandedAll = true; update(); };
    document.getElementById("collapseAll").onclick = () => { selected = null; expandedAll = false; update(); };
    search.addEventListener("input", () => { selected = null; expandedAll = false; update(); });
    update();
  </script>
</body>
</html>
